services:
  - type: web
    name: umami-recipe
    runtime: python
    region: oregon
    plan: free
    rootDir: python-scraper
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: TESSERACT_LANG
        value: fra+eng

