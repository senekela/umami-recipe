services:
  - type: web
    name: recipe-scraper
    runtime: python
    region: oregon
    plan: free
    rootDir: python-scraper
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: POETRY_VERSION
        value: ""

