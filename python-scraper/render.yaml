services:
  - type: web
    name: recipe-scraper
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd python-scraper && pip install -r requirements.txt
    startCommand: cd python-scraper && gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production

