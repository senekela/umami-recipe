services:
  - type: web
    name: umami-recipe
    runtime: docker
    region: oregon
    plan: free
    rootDir: python-scraper
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: TESSERACT_LANG
        value: fra+eng

